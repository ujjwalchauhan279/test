<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="container">

        <div class="album-container">
            <div class="album">
                <img id="Banner" src="" alt="Banner Unavailable">
            </div>
            <div class="song-details">
                <h4 id="song-name"></h4>
            </div>
        </div>

        <div class="progress-container">
            <div id="progress">
                <span></span>
            </div>
            <div class="time">
                <span id="current"></span>
                <span id="final"></span>
            </div>
        </div>

        <div class="controls">
            <button id="prev"><i class="fa-solid fa-backward-step"></i></button>
            <button id="play"><i class="fa-solid fa-play"></i></button>
            <button id="next"><i class="fa-solid fa-forward-step"></i></button>
            <div class="volume-container">
                <div id="volume">
                    <span></span>
                </div>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
