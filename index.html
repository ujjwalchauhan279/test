<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body>
    <div class="container">

        <div class="album-container">
            <div class="album">
                <img id="Banner" src="" alt="Banner Unavailable">
            </div>
            <div class="song-details">
                <h4 id="song-name"></h4>
            </div>
            <div class="volume-container">
                <button id="volume"><span class="material-symbols-outlined" style="color: #04205c;">volume_up</span></button>
            </div>
        </div>


        <div class="controls">

            <!-- progress top -->
            <div class="progress-wrapper">
                <div class="progress-container">
                    <div id="progress">
                        <span></span>
                    </div>
                </div>

                <div class="time">
                    <span id="current"></span>
                    <span id="final"></span>
                </div>
            </div>

            <!-- buttons bottom -->
            <div class="buttons">
                <button id="shuffle"><i class="fa-solid fa-shuffle"></i></button>
                <button id="prev"><i class="fa-solid fa-backward-step"></i></button>
                <button id="play"><i class="fa-solid fa-play"></i></button>
                <button id="next"><i class="fa-solid fa-forward-step"></i></button>
                <button id="repeat"><span class="material-symbols-outlined" style="font-weight: 400;">repeat</span></button>
            </div>

        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
